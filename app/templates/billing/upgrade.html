{% extends "base.html" %}
{% block title %}料金プラン - YN Tools{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto mt-12 px-4">
    <h1 class="text-2xl font-bold text-center mb-2">料金プラン</h1>
    <p class="text-gray-500 text-center mb-8">使いたいサービスを選んで申し込み</p>

    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
        <div class="bg-indigo-600 text-white py-5 text-center">
            <p class="text-sm font-medium">月額サブスクリプション</p>
            <p class="text-lg mt-1">1ツール <span class="text-2xl font-bold">&yen;100</span>/月</p>
        </div>

        <form action="/billing/checkout/tools" method="post" id="plan-form" class="p-6">

            <!-- 個別ツール選択 -->
            <p class="text-sm font-medium text-gray-600 mb-3">利用するツールを選択してください</p>
            <div class="space-y-3 mb-4">
                {% for tool in tools %}
                <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition tool-label" data-price="{{ tool.monthly_price }}">
                    <input type="checkbox" name="tool_slugs" value="{{ tool.slug }}"
                           class="w-4 h-4 text-indigo-600 rounded tool-cb">
                    <div class="ml-3 flex-1">
                        <span class="font-medium text-gray-800">{{ tool.name }}</span>
                    </div>
                    <span class="text-gray-400 text-sm">&yen;{{ tool.monthly_price }}/月</span>
                </label>
                {% endfor %}
            </div>

            <!-- 区切り線 -->
            <div class="relative my-5">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
                <div class="relative flex justify-center"><span class="bg-white px-3 text-xs text-gray-400">または</span></div>
            </div>

            <!-- すべてのサービス -->
            <label class="flex items-center p-4 border-2 border-indigo-200 rounded-lg cursor-pointer hover:bg-indigo-50 transition all-tools-label" data-price="2000">
                <input type="checkbox" id="all-tools-cb" class="w-5 h-5 text-indigo-600 rounded">
                <div class="ml-3 flex-1">
                    <span class="font-bold text-indigo-700">すべてのサービス</span>
                    <span class="ml-2 bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-0.5 rounded">おすすめ</span>
                    <p class="text-gray-500 text-xs mt-1">全ツール使い放題＋今後追加されるツールも含む</p>
                </div>
                <span class="text-indigo-600 font-bold">&yen;2,000<span class="text-xs font-normal text-gray-400">/月</span></span>
            </label>

            <!-- 合計金額 -->
            <div class="bg-gray-50 rounded-lg p-4 mt-6 mb-5 flex items-center justify-between">
                <span class="text-gray-600 text-sm font-medium">月額料金</span>
                <div>
                    <span class="text-2xl font-bold text-gray-900" id="total-price">&yen;0</span>
                    <span class="text-gray-500 text-sm">/月</span>
                </div>
            </div>

            <!-- お得メッセージ -->
            <div id="savings-msg" class="text-center mb-4" style="display:none;">
                <p class="text-indigo-600 text-sm font-medium" id="savings-text"></p>
            </div>

            <!-- hidden field for plan type -->
            <input type="hidden" name="plan_type" id="plan-type-field" value="per_tool">

            <button type="submit" id="submit-btn"
                    class="w-full bg-indigo-600 text-white py-3 rounded-lg text-lg font-medium hover:bg-indigo-700 transition disabled:opacity-40 disabled:cursor-not-allowed"
                    disabled>
                申し込む
            </button>
        </form>
    </div>

    <p class="text-gray-400 text-xs text-center mt-5 mb-12">
        Stripeによる安全な決済。いつでもキャンセルできます。<br>
        初回は1ヶ月間の無料トライアルですべてのツールをお試しいただけます。
    </p>
</div>

<script>
(function() {
    const toolCbs = document.querySelectorAll('.tool-cb');
    const allCb = document.getElementById('all-tools-cb');
    const totalEl = document.getElementById('total-price');
    const submitBtn = document.getElementById('submit-btn');
    const savingsMsg = document.getElementById('savings-msg');
    const savingsText = document.getElementById('savings-text');
    const planTypeField = document.getElementById('plan-type-field');
    const form = document.getElementById('plan-form');
    const ALL_PRICE = 2000;

    function update() {
        const isAll = allCb.checked;
        let total = 0;
        let toolCount = 0;

        if (isAll) {
            // すべてのサービス選択時：個別チェックを無効化
            toolCbs.forEach(cb => { cb.checked = false; cb.disabled = true; });
            total = ALL_PRICE;
            planTypeField.value = 'all_tools';
            form.action = '/billing/checkout';
        } else {
            toolCbs.forEach(cb => { cb.disabled = false; });
            toolCbs.forEach(cb => {
                if (cb.checked) {
                    const price = parseInt(cb.closest('.tool-label').dataset.price);
                    total += price;
                    toolCount++;
                }
            });
            planTypeField.value = 'per_tool';
            form.action = '/billing/checkout/tools';
        }

        totalEl.textContent = '\u00a5' + total.toLocaleString();
        submitBtn.disabled = total === 0;

        // お得メッセージ
        if (!isAll && toolCount > 0) {
            const toolTotal = total;
            if (toolTotal >= ALL_PRICE) {
                savingsMsg.style.display = 'block';
                savingsText.textContent = '「すべてのサービス」を選ぶと \u00a5' + (toolTotal - ALL_PRICE).toLocaleString() + ' お得です！';
            } else {
                savingsMsg.style.display = 'none';
            }
        } else {
            savingsMsg.style.display = 'none';
        }
    }

    toolCbs.forEach(cb => cb.addEventListener('change', update));
    allCb.addEventListener('change', update);
})();
</script>
{% endblock %}
