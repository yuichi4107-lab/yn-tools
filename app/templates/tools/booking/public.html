<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ form.name }} - 予約</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    const bookedSlots = {{ booked_slots | tojson }};
    const duration = {{ form.duration_min }};
    const startH = parseInt('{{ form.available_start }}'.split(':')[0]);
    const endH = parseInt('{{ form.available_end }}'.split(':')[0]);

    function generateSlots() {
        const dateInput = document.getElementById('booked_date').value;
        const container = document.getElementById('time-slots');
        container.innerHTML = '';
        if (!dateInput) return;

        const booked = bookedSlots.filter(s => s[0] === dateInput).map(s => s[1]);

        for (let h = startH; h < endH; h++) {
            for (let m = 0; m < 60; m += duration < 60 ? duration : 60) {
                const time = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
                const isBooked = booked.includes(time);
                container.innerHTML += `
                    <button type="button" onclick="selectSlot(this, '${time}')"
                        class="px-3 py-2 rounded border text-sm ${isBooked ? 'bg-gray-100 text-gray-300 cursor-not-allowed' : 'hover:bg-indigo-50 hover:border-indigo-300'}"
                        ${isBooked ? 'disabled' : ''}>${time}</button>`;
            }
        }
    }

    function selectSlot(btn, time) {
        document.querySelectorAll('#time-slots button').forEach(b => b.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600'));
        btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
        document.getElementById('booked_time').value = time;
    }

    async function submitBooking() {
        const form = document.getElementById('booking-form');
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = '送信中...';

        const resp = await fetch(location.pathname + '/submit', { method: 'POST', body: new FormData(form) });
        const data = await resp.json();

        if (data.error) {
            alert(data.error);
            btn.disabled = false;
            btn.textContent = '予約する';
        } else {
            document.getElementById('booking-form').style.display = 'none';
            document.getElementById('success-msg').classList.remove('hidden');
        }
    }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-xl mx-auto px-4 py-12">
        <div class="bg-white rounded-xl shadow-sm border p-8">
            <h1 class="text-2xl font-bold text-gray-900 mb-2">{{ form.name }}</h1>
            {% if form.description %}
            <p class="text-gray-500 text-sm mb-6">{{ form.description }}</p>
            {% endif %}
            <p class="text-xs text-gray-400 mb-6">所要時間: {{ form.duration_min }}分 | {{ form.available_start }}〜{{ form.available_end }}</p>

            <form id="booking-form" class="space-y-4">
                <input type="hidden" name="booked_time" id="booked_time">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">お名前 <span class="text-red-500">*</span></label>
                    <input type="text" name="guest_name" required class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">メールアドレス <span class="text-red-500">*</span></label>
                    <input type="email" name="guest_email" required class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">日付を選択 <span class="text-red-500">*</span></label>
                    <input type="date" name="booked_date" id="booked_date" onchange="generateSlots()" required class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">時間を選択 <span class="text-red-500">*</span></label>
                    <div id="time-slots" class="flex flex-wrap gap-2">
                        <p class="text-gray-400 text-sm">日付を選択してください</p>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">備考</label>
                    <textarea name="guest_note" rows="2" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="ご要望等あればご記入ください"></textarea>
                </div>
                <button type="button" id="submit-btn" onclick="submitBooking()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition">予約する</button>
            </form>

            <div id="success-msg" class="hidden text-center py-12">
                <div class="text-4xl mb-4">&#10003;</div>
                <h2 class="text-xl font-bold text-green-600 mb-2">予約が完了しました</h2>
                <p class="text-gray-500 text-sm">確認メールをお送りします。</p>
            </div>
        </div>
        <p class="text-center text-gray-300 text-xs mt-6">Powered by YN Tools</p>
    </div>
</body>
</html>
