{% extends "base.html" %}
{% block title %}パスワード生成 - YN Tools{% endblock %}

{% block head %}
<script>
function generatePassword() {
    const length = parseInt(document.getElementById('pw-length').value);
    const upper = document.getElementById('pw-upper').checked;
    const lower = document.getElementById('pw-lower').checked;
    const digits = document.getElementById('pw-digits').checked;
    const symbols = document.getElementById('pw-symbols').checked;
    const exclude = document.getElementById('pw-exclude').value;

    let charset = '';
    if (upper) charset += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if (lower) charset += 'abcdefghijklmnopqrstuvwxyz';
    if (digits) charset += '0123456789';
    if (symbols) charset += '!@#$%^&*()_+-=[]{}|;:,.<>?';

    // 除外文字を除去
    if (exclude) {
        for (const ch of exclude) {
            charset = charset.replaceAll(ch, '');
        }
    }

    if (charset.length === 0) {
        alert('少なくとも1つの文字種を選択してください。');
        return;
    }

    const array = new Uint32Array(length);
    crypto.getRandomValues(array);
    let password = '';
    for (let i = 0; i < length; i++) {
        password += charset[array[i] % charset.length];
    }

    document.getElementById('pw-result').value = password;
    updateStrength(password);
}

function updateStrength(password) {
    const bar = document.getElementById('strength-bar');
    const label = document.getElementById('strength-label');

    let score = 0;
    if (password.length >= 8) score++;
    if (password.length >= 12) score++;
    if (password.length >= 16) score++;
    if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
    if (/\d/.test(password)) score++;
    if (/[^a-zA-Z0-9]/.test(password)) score++;

    const levels = [
        { max: 2, color: 'bg-red-500', text: '弱い', width: '25%' },
        { max: 3, color: 'bg-orange-500', text: 'やや弱い', width: '50%' },
        { max: 4, color: 'bg-yellow-500', text: '普通', width: '65%' },
        { max: 5, color: 'bg-green-400', text: '強い', width: '85%' },
        { max: 99, color: 'bg-green-600', text: '非常に強い', width: '100%' },
    ];

    const level = levels.find(l => score <= l.max);
    bar.className = `h-2 rounded-full transition-all duration-300 ${level.color}`;
    bar.style.width = level.width;
    label.textContent = level.text;
    label.className = `text-sm font-medium ${level.color.replace('bg-', 'text-')}`;
}

function copyPassword() {
    const pw = document.getElementById('pw-result').value;
    if (!pw) return;
    navigator.clipboard.writeText(pw).then(() => {
        const btn = document.getElementById('copy-btn');
        const orig = btn.innerHTML;
        btn.innerHTML = '<svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> コピー済み';
        btn.classList.add('text-green-600', 'border-green-300');
        setTimeout(() => {
            btn.innerHTML = orig;
            btn.classList.remove('text-green-600', 'border-green-300');
        }, 2000);
    });
}

function updateLengthDisplay() {
    const val = document.getElementById('pw-length').value;
    document.getElementById('pw-length-display').textContent = val;
}

document.addEventListener('DOMContentLoaded', () => {
    generatePassword();
});
</script>
{% endblock %}

{% block content %}
<div class="mb-8">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">パスワード生成</h1>
            <p class="text-gray-500 mt-1">安全なパスワードをワンクリック生成。長さ・文字種・強度チェック対応。</p>
        </div>
        <a href="/guide#passgen" class="flex items-center gap-1.5 px-3 py-2 text-sm text-indigo-600 border border-indigo-200 rounded-lg hover:bg-indigo-50 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            使い方ガイド
        </a>
    </div>

    <div class="max-w-2xl mx-auto">
        <!-- 生成結果 -->
        <div class="bg-white rounded-xl shadow-sm border p-6 mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">生成されたパスワード</label>
            <div class="flex gap-2 mb-4">
                <input type="text" id="pw-result" readonly class="flex-1 border rounded-lg px-4 py-3 text-lg font-mono bg-gray-50 select-all" placeholder="パスワードを生成してください">
                <button id="copy-btn" onclick="copyPassword()" class="px-4 py-3 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50 transition whitespace-nowrap">
                    <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
                    コピー
                </button>
            </div>
            <!-- 強度表示 -->
            <div class="flex items-center gap-3">
                <span class="text-xs text-gray-500">強度:</span>
                <div class="flex-1 bg-gray-200 rounded-full h-2">
                    <div id="strength-bar" class="h-2 rounded-full bg-gray-300 transition-all duration-300" style="width: 0%"></div>
                </div>
                <span id="strength-label" class="text-sm font-medium text-gray-400">--</span>
            </div>
        </div>

        <!-- 設定 -->
        <div class="bg-white rounded-xl shadow-sm border p-6 mb-6">
            <h2 class="text-lg font-semibold mb-4">設定</h2>
            <div class="space-y-5">
                <!-- 長さスライダー -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-sm font-medium text-gray-700">パスワードの長さ</label>
                        <span id="pw-length-display" class="text-lg font-bold text-indigo-600">16</span>
                    </div>
                    <input type="range" id="pw-length" min="4" max="64" value="16" oninput="updateLengthDisplay()" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                    <div class="flex justify-between text-xs text-gray-400 mt-1">
                        <span>4</span>
                        <span>16</span>
                        <span>32</span>
                        <span>64</span>
                    </div>
                </div>

                <!-- 文字種チェックボックス -->
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-3">含める文字種</label>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <label class="flex items-center gap-2 p-3 border rounded-lg hover:bg-gray-50 cursor-pointer">
                            <input type="checkbox" id="pw-upper" checked class="w-4 h-4 text-indigo-600 rounded">
                            <div>
                                <span class="text-sm font-medium">大文字</span>
                                <span class="text-xs text-gray-400 block">A-Z</span>
                            </div>
                        </label>
                        <label class="flex items-center gap-2 p-3 border rounded-lg hover:bg-gray-50 cursor-pointer">
                            <input type="checkbox" id="pw-lower" checked class="w-4 h-4 text-indigo-600 rounded">
                            <div>
                                <span class="text-sm font-medium">小文字</span>
                                <span class="text-xs text-gray-400 block">a-z</span>
                            </div>
                        </label>
                        <label class="flex items-center gap-2 p-3 border rounded-lg hover:bg-gray-50 cursor-pointer">
                            <input type="checkbox" id="pw-digits" checked class="w-4 h-4 text-indigo-600 rounded">
                            <div>
                                <span class="text-sm font-medium">数字</span>
                                <span class="text-xs text-gray-400 block">0-9</span>
                            </div>
                        </label>
                        <label class="flex items-center gap-2 p-3 border rounded-lg hover:bg-gray-50 cursor-pointer">
                            <input type="checkbox" id="pw-symbols" checked class="w-4 h-4 text-indigo-600 rounded">
                            <div>
                                <span class="text-sm font-medium">記号</span>
                                <span class="text-xs text-gray-400 block">!@#$%...</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- 除外文字 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">除外する文字</label>
                    <input type="text" id="pw-exclude" class="w-full border rounded-lg px-3 py-2 text-sm font-mono" placeholder="例: 0Ol1I">
                    <p class="text-xs text-gray-400 mt-1">紛らわしい文字（0とO、1とlなど）を除外できます</p>
                </div>
            </div>
        </div>

        <!-- 生成ボタン -->
        <button onclick="generatePassword()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            パスワードを生成
        </button>
    </div>
</div>
{% endblock %}
