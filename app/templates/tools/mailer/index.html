{% extends "tools/mailer/base_mailer.html" %}
{% block title %}メール送信 - YN Tools{% endblock %}

{% block mailer_content %}
<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
    <h1 class="text-xl font-bold">メール送信</h1>
    <a href="/guide#mailer" class="flex items-center gap-1.5 px-3 py-2 text-sm text-indigo-600 border border-indigo-200 rounded-lg hover:bg-indigo-50 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        使い方ガイド
    </a>
</div>

<form action="/tools/mailer/preview" method="post" enctype="multipart/form-data" class="bg-white rounded-xl shadow-sm border p-6 space-y-4">
    <!-- Template selection -->
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">テンプレート（任意）</label>
        <select name="template_id" id="template_select" class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500" onchange="loadTemplate(this.value)">
            <option value="">-- テンプレートを選択 --</option>
            {% for t in templates %}
            <option value="{{ t.id }}">{{ t.name }}</option>
            {% endfor %}
        </select>
    </div>

    <!-- Recipient -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">宛先メールアドレス</label>
            <input type="email" name="recipient_email" required class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500" placeholder="example@company.com">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">宛先名（任意）</label>
            <input type="text" name="recipient_name" class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500" placeholder="山田太郎">
        </div>
    </div>

    <!-- Subject -->
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">件名</label>
        <input type="text" name="subject" id="subject_field" required class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
    </div>

    <!-- Body -->
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">本文</label>
        <textarea name="body" id="body_field" rows="12" required class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 font-mono text-sm"></textarea>
    </div>

    <!-- Attachments -->
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">添付ファイル（任意）</label>
        <input type="file" name="extra_attachments" multiple class="text-sm">
    </div>

    <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">
        プレビュー
    </button>
</form>

<script>
async function loadTemplate(id) {
    if (!id) return;
    const res = await fetch(`/tools/mailer/api/template/${id}`);
    const data = await res.json();
    document.getElementById('subject_field').value = data.subject;
    document.getElementById('body_field').value = data.body;
}
</script>
{% endblock %}
