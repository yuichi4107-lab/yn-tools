{% extends "tools/mailer/base_mailer.html" %}
{% block title %}一括送信 - YN Tools{% endblock %}

{% block mailer_content %}
<h1 class="text-xl font-bold mb-6">一括送信</h1>

<form action="/tools/mailer/bulk/preview" method="post" class="bg-white rounded-xl shadow-sm border p-6 space-y-4">
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">テンプレート</label>
        <select name="template_id" required class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
            <option value="">-- 選択してください --</option>
            {% for t in templates %}
            <option value="{{ t.id }}">{{ t.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">送信先 <span id="selected_count" class="text-indigo-600"></span></label>
        <div class="flex gap-2 mb-2">
            <button type="button" onclick="toggleAll(true)" class="text-xs bg-gray-100 px-3 py-1 rounded hover:bg-gray-200">全選択</button>
            <button type="button" onclick="toggleAll(false)" class="text-xs bg-gray-100 px-3 py-1 rounded hover:bg-gray-200">全解除</button>
        </div>
        <div class="max-h-64 overflow-y-auto border rounded-lg p-3 space-y-1">
            {% for c in contacts %}
            <label class="flex items-center gap-2 text-sm p-1 hover:bg-gray-50 rounded cursor-pointer">
                <input type="checkbox" name="contact_ids" value="{{ c.id }}" class="contact-cb rounded" onchange="updateCount()">
                <span>{{ c.name or '(名前なし)' }}</span>
                <span class="text-gray-400">{{ c.email }}</span>
                {% if c.company %}<span class="text-gray-300">/ {{ c.company }}</span>{% endif %}
            </label>
            {% endfor %}
            {% if not contacts %}
            <p class="text-gray-400 text-sm">連絡先がありません。<a href="/tools/mailer/contacts" class="text-indigo-600 underline">追加する</a></p>
            {% endif %}
        </div>
    </div>

    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">送信間隔（秒）</label>
        <select name="delay" class="border-gray-300 rounded-lg shadow-sm">
            <option value="3">3秒</option>
            <option value="5">5秒</option>
            <option value="10">10秒</option>
            <option value="30">30秒</option>
        </select>
    </div>

    <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">
        プレビュー
    </button>
</form>

<script>
function toggleAll(checked) {
    document.querySelectorAll('.contact-cb').forEach(cb => cb.checked = checked);
    updateCount();
}
function updateCount() {
    const n = document.querySelectorAll('.contact-cb:checked').length;
    document.getElementById('selected_count').textContent = n ? `(${n}件選択)` : '';
}
</script>
{% endblock %}
