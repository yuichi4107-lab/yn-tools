{% extends "base.html" %}
{% block title %}{{ form.title }}を編集 - フォームビルダー{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="/tools/formbuilder/" class="text-sm text-indigo-600 hover:underline">&larr; フォーム一覧に戻る</a>
</div>

<div class="grid lg:grid-cols-2 gap-6">
    <!-- エディター -->
    <div>
        <div class="bg-white rounded-xl shadow-sm border p-5 mb-4">
            <h2 class="font-bold text-gray-900 mb-3">基本設定</h2>
            <div class="space-y-3">
                <input type="text" id="formTitle" value="{{ form.title }}" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm font-medium">
                <textarea id="formDesc" rows="2" placeholder="説明（任意）" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm">{{ form.description }}</textarea>
                <label class="flex items-center gap-2 text-sm">
                    <input type="checkbox" id="formActive" {% if form.is_active %}checked{% endif %} class="rounded">
                    <span>公開する</span>
                </label>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border p-5">
            <div class="flex items-center justify-between mb-3">
                <h2 class="font-bold text-gray-900">フィールド</h2>
                <button onclick="addField()" class="text-indigo-600 text-sm font-medium hover:underline">+ フィールド追加</button>
            </div>
            <div id="fieldList" class="space-y-3"></div>
        </div>

        <button onclick="saveForm()" class="w-full mt-4 bg-indigo-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">保存</button>
    </div>

    <!-- プレビュー -->
    <div>
        <div class="bg-white rounded-xl shadow-sm border p-5 sticky top-20">
            <div class="flex items-center justify-between mb-4">
                <h2 class="font-bold text-gray-900">プレビュー</h2>
                <button onclick="copyPublicUrl()" class="text-xs text-indigo-600 hover:underline">公開URLをコピー</button>
            </div>
            <div id="preview" class="border rounded-lg p-4 bg-gray-50 min-h-[200px]"></div>
        </div>
    </div>
</div>

<script>
let fields = {{ form.fields_json | safe }};

const FIELD_TYPES = [
    {value: 'text', label: 'テキスト（1行）'},
    {value: 'textarea', label: 'テキスト（複数行）'},
    {value: 'email', label: 'メールアドレス'},
    {value: 'tel', label: '電話番号'},
    {value: 'number', label: '数値'},
    {value: 'date', label: '日付'},
    {value: 'select', label: 'ドロップダウン'},
    {value: 'radio', label: 'ラジオボタン'},
    {value: 'checkbox', label: 'チェックボックス'},
];

function addField() {
    fields.push({label: '', type: 'text', required: false, options: ''});
    render();
}

function removeField(i) {
    fields.splice(i, 1);
    render();
}

function render() {
    const list = document.getElementById('fieldList');
    list.innerHTML = fields.map((f, i) => `
        <div class="border rounded-lg p-3 bg-gray-50">
            <div class="flex gap-2 mb-2">
                <input type="text" value="${f.label}" onchange="fields[${i}].label=this.value;renderPreview()"
                    placeholder="ラベル" class="flex-1 rounded border border-gray-300 px-2 py-1.5 text-sm">
                <select onchange="fields[${i}].type=this.value;render()" class="rounded border border-gray-300 px-2 py-1.5 text-sm">
                    ${FIELD_TYPES.map(t => `<option value="${t.value}" ${f.type===t.value?'selected':''}>${t.label}</option>`).join('')}
                </select>
                <button onclick="removeField(${i})" class="text-red-400 hover:text-red-600 px-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            ${['select','radio','checkbox'].includes(f.type) ? `
            <input type="text" value="${f.options||''}" onchange="fields[${i}].options=this.value;renderPreview()"
                placeholder="選択肢（カンマ区切り）" class="w-full rounded border border-gray-300 px-2 py-1.5 text-xs mb-2">
            ` : ''}
            <label class="flex items-center gap-1.5 text-xs text-gray-500">
                <input type="checkbox" ${f.required?'checked':''} onchange="fields[${i}].required=this.checked">
                必須
            </label>
        </div>
    `).join('');
    renderPreview();
}

function renderPreview() {
    const preview = document.getElementById('preview');
    if (!fields.length) { preview.innerHTML = '<p class="text-gray-400 text-sm text-center">フィールドを追加してください</p>'; return; }
    preview.innerHTML = fields.map((f, i) => {
        const label = `<label class="block text-sm font-medium text-gray-700 mb-1">${f.label || '(ラベル未設定)'}${f.required ? '<span class="text-red-500 ml-0.5">*</span>': ''}</label>`;
        let input = '';
        switch(f.type) {
            case 'textarea': input = '<textarea class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm" rows="2"></textarea>'; break;
            case 'select': input = `<select class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm"><option>選択してください</option>${(f.options||'').split(',').map(o=>`<option>${o.trim()}</option>`).join('')}</select>`; break;
            case 'radio': input = `<div class="flex flex-wrap gap-3">${(f.options||'').split(',').map(o=>`<label class="flex items-center gap-1 text-sm"><input type="radio" name="p${i}">${o.trim()}</label>`).join('')}</div>`; break;
            case 'checkbox': input = `<div class="flex flex-wrap gap-3">${(f.options||'').split(',').map(o=>`<label class="flex items-center gap-1 text-sm"><input type="checkbox">${o.trim()}</label>`).join('')}</div>`; break;
            default: input = `<input type="${f.type}" class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm">`;
        }
        return `<div class="mb-3">${label}${input}</div>`;
    }).join('');
}

async function saveForm() {
    const fd = new FormData();
    fd.append('title', document.getElementById('formTitle').value);
    fd.append('description', document.getElementById('formDesc').value);
    fd.append('fields_json', JSON.stringify(fields));
    fd.append('is_active', document.getElementById('formActive').checked ? 'true' : 'false');
    const res = await fetch('/tools/formbuilder/api/{{ form.id }}/update', {method: 'POST', body: fd});
    if (res.ok) showToast('保存しました', 'success');
    else showToast('保存に失敗しました', 'error');
}

function copyPublicUrl() {
    const url = location.origin + '/tools/formbuilder/p/{{ form.public_key }}';
    navigator.clipboard.writeText(url).then(() => showToast('公開URLをコピーしました', 'success'));
}

render();
</script>
{% endblock %}
